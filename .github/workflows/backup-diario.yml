name: Backup Diário — Portal Revenda LC

on:
  schedule:
    - cron: '0 3 * * *'  # 00:00 horário de Brasília (UTC-3)
  workflow_dispatch:      # Permite disparar manualmente pelo GitHub

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Criar script de exportação
        run: |
          cat > backup.js << 'SCRIPT'
          const fs = require('fs');

          const SUPABASE_URL  = process.env.SUPABASE_URL;
          const SUPABASE_KEY  = process.env.SUPABASE_SERVICE_KEY;
          const DATE          = new Date().toISOString().slice(0, 10);

          const TABELAS = [
            'revendas',
            'perfis',
            'historico_cards',
            'tarefas',
            'atividades',
            'handovers',
            'treinamentos',
            'importacoes',
            'auditoria',
            'orion_metas',
            'orion_leads_vendidos',
          ];

          async function exportarTabela(tabela) {
            const rows = [];
            let offset = 0;
            while (true) {
              const res = await fetch(
                `${SUPABASE_URL}/rest/v1/${tabela}?select=*&limit=1000&offset=${offset}`,
                {
                  headers: {
                    'apikey':        SUPABASE_KEY,
                    'Authorization': `Bearer ${SUPABASE_KEY}`,
                    'Accept':        'application/json',
                  },
                }
              );
              if (!res.ok) {
                const txt = await res.text();
                console.warn(`  ⚠️  ${tabela} HTTP ${res.status}: ${txt.slice(0, 80)}`);
                break;
              }
              const pagina = await res.json();
              if (!Array.isArray(pagina) || pagina.length === 0) break;
              rows.push(...pagina);
              if (pagina.length < 1000) break;
              offset += 1000;
            }
            return rows;
          }

          (async () => {
            if (!SUPABASE_URL || !SUPABASE_KEY) {
              console.error('❌ SUPABASE_URL ou SUPABASE_SERVICE_KEY não configurados.');
              process.exit(1);
            }

            fs.mkdirSync('backup', { recursive: true });

            const resumo = { data: DATE, tabelas: {} };
            let totalRegistros = 0;

            for (const tabela of TABELAS) {
              process.stdout.write(`  Exportando ${tabela}... `);
              const dados = await exportarTabela(tabela);
              const arquivo = `backup/${DATE}_${tabela}.json`;
              fs.writeFileSync(arquivo, JSON.stringify(dados, null, 2), 'utf8');
              resumo.tabelas[tabela] = dados.length;
              totalRegistros += dados.length;
              console.log(`${dados.length} registros`);
            }

            resumo.total_registros = totalRegistros;
            fs.writeFileSync('backup/manifest.json', JSON.stringify(resumo, null, 2), 'utf8');

            console.log(`\n✅ Backup concluído: ${totalRegistros} registros em ${TABELAS.length} tabelas`);
            console.log(`   Arquivo: backup/${DATE}_*.json`);
          })();
          SCRIPT

      - name: Exportar dados do Supabase
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node backup.js

      - name: Upload do backup como artefato
        uses: actions/upload-artifact@v4
        with:
          name: backup-${{ github.run_number }}-${{ github.run_attempt }}
          path: backup/
          retention-days: 90
          if-no-files-found: error

      - name: Resumo no log
        if: always()
        run: |
          echo "### Backup Diário — Portal Revenda LC" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f backup/manifest.json ]; then
            echo "**Data:** $(cat backup/manifest.json | python3 -c 'import sys,json; d=json.load(sys.stdin); print(d["data"])')" >> $GITHUB_STEP_SUMMARY
            echo "**Total de registros:** $(cat backup/manifest.json | python3 -c 'import sys,json; d=json.load(sys.stdin); print(d["total_registros"])')" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Tabela | Registros |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-----------|" >> $GITHUB_STEP_SUMMARY
            cat backup/manifest.json | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          for t, n in d['tabelas'].items():
              print(f'| {t} | {n} |')
          " >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Backup falhou — manifest.json não encontrado" >> $GITHUB_STEP_SUMMARY
          fi
